<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<body>

    <section class="login">
        <div class="container">

            <div class="logo">
                <img src="KCBlogo.png" alt="Logo" width="100px">
                <p>Secure</p>
            </div>

            <div class="hero">
                <h2>Welcome Back</h2>
                <p>Log in to your KCB account and enjoy secure banking anytime, anywhere.</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" fromControlname="email">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" formControlName="password">
                <button type="submit">Login</button>
            </form>
        </div>
    </section>
    
</body>
</html>
